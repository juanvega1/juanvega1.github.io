<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Juan Vega">
  <title>Calculadora — Juan Vega</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230d0d0d'/><text x='10' y='46' font-family='system-ui,sans-serif' font-size='36' font-weight='800' fill='white'>J</text><text x='32' y='46' font-family='system-ui,sans-serif' font-size='36' font-weight='800' fill='%23c0392b'>V</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230d0d0d'/><text x='10' y='46' font-family='system-ui,sans-serif' font-size='36' font-weight='800' fill='white'>J</text><text x='32' y='46' font-family='system-ui,sans-serif' font-size='36' font-weight='800' fill='%23c0392b'>V</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #e8e8e8; min-height: 100vh; padding-bottom: 48px; }

    nav { background: #111; border-bottom: 1px solid #1f1f1f; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .nav-logo { font-size: 16px; font-weight: 700; color: #fff; }
    .nav-logo span { color: #c0392b; }
    .nav-back { font-size: 13px; color: #888; text-decoration: none; }

    .total-block { margin: 16px 16px 0; background: #111; border: 1px solid #1f1f1f; border-radius: 16px; padding: 24px; text-align: center; }
    .total-label { font-size: 11px; font-weight: 700; color: #c0392b; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
    .total-val { font-size: 52px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -2px; }
    .total-items { font-size: 12px; color: #666; margin-top: 8px; }

    .form-card { margin: 12px 16px 0; background: #111; border: 1px solid #1f1f1f; border-radius: 16px; padding: 16px; }

    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .field { flex: 1; min-width: 0; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }

    .qty-wrap { display: flex; align-items: center; background: #181818; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; height: 44px; }
    .qty-btn { width: 36px; height: 44px; border: none; background: transparent; color: #ccc; font-size: 20px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .qty-btn:active { background: #222; }
    .qty-num { flex: 1; text-align: center; font-size: 15px; font-weight: 700; color: #fff; border: none; background: transparent; outline: none; min-width: 0; width: 100%; }

    .price-input { display: block; width: 100%; height: 44px; border: 1px solid #2a2a2a; border-radius: 10px; background: #181818; color: #fff; font-size: 15px; font-weight: 600; padding: 0 12px; outline: none; font-family: inherit; -webkit-appearance: none; }
    .price-input:focus { border-color: #c0392b; }
    .price-input::placeholder { color: #444; font-weight: 400; }
    .price-input.error { border-color: #7a1a1a; background: #1a0808; }

    .preview { background: #181818; border: 1px solid #222; border-radius: 10px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .preview-lbl { font-size: 13px; color: #888; }
    .preview-val { font-size: 18px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }

    .btn-row { display: flex; gap: 10px; }
    .add-btn { flex: 1; height: 48px; background: #c0392b; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .add-btn:active { background: #a93226; transform: scale(0.98); }
    .clear-btn { height: 48px; padding: 0 16px; background: transparent; color: #c0392b; border: 1px solid #2a1010; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
    .clear-btn:active { transform: scale(0.98); }
    .clear-btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

    /* Modal de confirmación */
    .modal-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; min-height: 100vh; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px 20px; width: calc(100% - 64px); max-width: 300px; text-align: center; }
    .modal-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .modal-sub { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-cancel { flex: 1; height: 44px; background: #222; color: #aaa; border: 1px solid #333; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .modal-confirm { flex: 1; height: 44px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .modal-confirm:active { background: #a93226; }

    .section-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 20px 10px; }

    .table-wrap { margin: 0 16px; background: #111; border: 1px solid #1f1f1f; border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    th { background: #0f0f0f; color: #666; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 12px; text-align: left; border-bottom: 1px solid #1a1a1a; }
    th.r { text-align: right; }
    td { padding: 12px 12px; border-bottom: 1px solid #161616; color: #e8e8e8; vertical-align: middle; }
    td.r { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted { color: #555; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #141414; }

    .del-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #2a1010; background: transparent; color: #7a2020; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: auto; line-height: 1; }
    .del-btn:hover { background: #1a0808; border-color: #c0392b; color: #c0392b; }

    .empty-msg { text-align: center; padding: 36px 20px; color: #444; font-size: 13px; }

    .col-n { width: 28px; } .col-qty { width: 58px; } .col-price { width: 100px; } .col-sub { width: 108px; } .col-del { width: 36px; }

    footer { border-top: 1px solid #1a1a1a; margin-top: 28px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
    .footer-text { font-size: 11px; color: #444; }
    .footer-dot { width: 6px; height: 6px; background: #c0392b; border-radius: 50%; }

    .error-shake { animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <p class="modal-title">¿Limpiar todo?</p>
      <p class="modal-sub">Se van a borrar todos los ítems de la tabla.</p>
      <div class="modal-btns">
        <button class="modal-cancel" id="modal-cancel">Cancelar</button>
        <button class="modal-confirm" id="modal-confirm">Borrar todo</button>
      </div>
    </div>
  </div>

  <nav>
    <a href="index.html" class="nav-back">← Inicio</a>
    <span class="nav-logo">juan<span>vega</span></span>
    <span style="width:52px"></span>
  </nav>

  <div class="total-block">
    <p class="total-label">Total</p>
    <p class="total-val" id="total-val">$ 0</p>
    <p class="total-items" id="total-items">Sin ítems cargados</p>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Cantidad</label>
        <div class="qty-wrap">
          <button class="qty-btn" id="btn-minus">−</button>
          <input class="qty-num" id="qty" type="number" value="1" min="1" readonly>
          <button class="qty-btn" id="btn-plus">+</button>
        </div>
      </div>
      <div class="field">
        <label>Precio unitario</label>
        <input class="price-input" id="price" type="number" min="0" placeholder="0" inputmode="decimal">
      </div>
    </div>

    <div class="preview">
      <span class="preview-lbl">Precio × cantidad</span>
      <span class="preview-val" id="preview-val">$ 0</span>
    </div>

    <div class="btn-row">
      <button class="add-btn" id="add-btn">Agregar</button>
      <button class="clear-btn" id="clear-btn" disabled>Limpiar todo</button>
    </div>
  </div>

  <p class="section-label">Ítems</p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-n">#</th>
          <th class="col-qty r">Cant.</th>
          <th class="col-price r">Precio</th>
          <th class="col-sub r">Subtotal</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty-msg">Agregá productos usando el formulario</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    <span class="footer-text">calculadora de productos</span>
    <div class="footer-dot"></div>
  </footer>

  <script>
    var qtyEl = document.getElementById('qty');
    var priceEl = document.getElementById('price');
    var previewEl = document.getElementById('preview-val');
    var totalValEl = document.getElementById('total-val');
    var totalItemsEl = document.getElementById('total-items');
    var tbody = document.getElementById('tbody');
    var clearBtn = document.getElementById('clear-btn');
    var modal = document.getElementById('modal');
    var rows = [], counter = 0;

    function fmt(n) { return '$ ' + Math.round(n).toLocaleString('es-AR'); }

    function updatePreview() {
      previewEl.textContent = fmt((parseInt(qtyEl.value)||1) * (parseFloat(priceEl.value)||0));
    }

    function updateTotal() {
      var total = rows.reduce(function(s,r){ return s+r.subtotal; }, 0);
      totalValEl.textContent = fmt(total);
      var n = rows.length;
      totalItemsEl.textContent = n===0 ? 'Sin ítems cargados' : n===1 ? '1 ítem cargado' : n+' ítems cargados';
      clearBtn.disabled = n===0;
    }

    function renderTable() {
      tbody.innerHTML = '';
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Agregá productos usando el formulario</td></tr>';
        return;
      }
      rows.forEach(function(r, i) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="muted">'+(i+1)+'</td>'+
          '<td class="r">'+r.qty+'</td>'+
          '<td class="r">'+fmt(r.price)+'</td>'+
          '<td class="r"><strong style="color:#fff">'+fmt(r.subtotal)+'</strong></td>'+
          '<td><button class="del-btn" data-id="'+r.id+'">×</button></td>';
        tbody.appendChild(tr);
      });
    }

    function resetForm() { priceEl.value=''; qtyEl.value=1; updatePreview(); }

    function doClear() {
      rows=[]; renderTable(); updateTotal(); resetForm();
      modal.classList.remove('active');
    }

    document.getElementById('btn-minus').addEventListener('click', function(){
      var v = parseInt(qtyEl.value)||1; if(v>1){qtyEl.value=v-1; updatePreview();}
    });
    document.getElementById('btn-plus').addEventListener('click', function(){
      qtyEl.value=(parseInt(qtyEl.value)||1)+1; updatePreview();
    });
    priceEl.addEventListener('input', updatePreview);

    document.getElementById('add-btn').addEventListener('click', function(){
      var qty = parseInt(qtyEl.value)||1;
      var price = parseFloat(priceEl.value);
      if(!price||price<=0){
        priceEl.classList.add('error','error-shake');
        priceEl.focus();
        setTimeout(function(){ priceEl.classList.remove('error','error-shake'); }, 1000);
        return;
      }
      rows.push({id:++counter, qty:qty, price:price, subtotal:qty*price});
      renderTable(); updateTotal(); resetForm();
    });

    clearBtn.addEventListener('click', function(){
      modal.classList.add('active');
    });

    document.getElementById('modal-cancel').addEventListener('click', function(){
      modal.classList.remove('active');
    });

    document.getElementById('modal-confirm').addEventListener('click', doClear);

    modal.addEventListener('click', function(e){
      if(e.target === modal) modal.classList.remove('active');
    });

    tbody.addEventListener('click', function(e){
      var btn = e.target.closest('.del-btn');
      if(!btn) return;
      rows = rows.filter(function(r){ return r.id!==parseInt(btn.dataset.id); });
      renderTable(); updateTotal();
    });

    updatePreview();
  </script>
</body>
</html>
